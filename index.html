<style>
  /* ── RESET ── */

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; height: 100dvh; overflow: hidden; }

  /* ── LAYOUT ── */

  .transcript-line .ts-label { font-size: 11px; color: #bbb; margin-right: 8px; }

  /* ── EMPTY / PROCESSING STATES ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: #aaa; }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 500; color: #888; }
  .empty-sub { font-size: 13px; color: #bbb; text-align: center; max-width: 280px; line-height: 1.5; }

  .processing-banner { background: #fffbf0; border: 1px solid #e8cc80; border-radius: 10px; padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
  .spinner { width: 16px; height: 16px; border: 2px solid #e8cc80; border-top-color: #c89020; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; margin-top: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pb-text { font-size: 13px; color: #8a6010; line-height: 1.5; }
  .pb-text strong { display: block; margin-bottom: 2px; color: #6a4808; }

  /* ── RECORDING OVERLAY (timer) ── */
  .rec-timer { position: fixed; bottom: 20px; right: 20px; background: #e05555; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: none; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .rec-timer.visible { display: block; }

  /* ── MOBILE MENU BUTTON ── */

  @media (max-width: 700px) { .menu-btn { display: block; } }

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SUPABASE INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let recorder       = null;
let isRecording    = false;
let sessionId      = null;
let chunkNum       = 0;
let recTimerInt    = null;
let recSeconds     = 0;
let pollInterval   = null;
let currentSession = null;
let currentTab     = 'summary';
const AVATAR_COLORS = ['av0','av1','av2','av3','av4'];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RECORDING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function toggleRecording() {
  if (!isRecording) await startRecording();
  else await stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    sessionId = crypto.randomUUID();
    chunkNum  = 0;

    // Pick best supported audio format
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus']
      .find(m => MediaRecorder.isTypeSupported(m)) || '';

    recorder = new MediaRecorder(stream, mimeType ? { mimeType, audioBitsPerSecond: 32000 } : {});

    recorder.ondataavailable = async (e) => {
      if (e.data && e.data.size > 0) {
        await uploadChunk(e.data, chunkNum++);
      }
    };

    recorder.start(30000); // fire ondataavailable every 30 seconds
    isRecording = true;

    // UI
    const btn = document.getElementById('recordBtn');
    btn.classList.add('recording');
    document.getElementById('recordBtnText').textContent = 'Recording... (tap to stop)';
    document.getElementById('recTimer').classList.add('visible');

    recSeconds = 0;
    recTimerInt = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60);
      const s = String(recSeconds % 60).padStart(2,'0');
      document.getElementById('recTimerDisplay').textContent = `${m}:${s}`;
    }, 1000);

    // Ask for session name
    const name = prompt('Name this session (e.g. "Bandra hangout"):') || `Session ${new Date().toLocaleDateString()}`;

    // Pre-create session in Supabase as "pending"
    await sb.from('sessions').insert({
      id: sessionId,
      name,
      status: 'recording',
      created_at: new Date().toISOString(),
    });

    loadSessions();

  } catch (err) {
    alert('Microphone access denied. Please allow mic access and try again.\n\n' + err.message);
  }
}

async function uploadChunk(blob, num) {
  try {
    // 1. Get presigned URL from Modal
    const res = await fetch(`${CONFIG.MODAL_PRESIGNED_URL}?session_id=${sessionId}&chunk_num=${num}`);
    const { url } = await res.json();

    // 2. Upload directly to R2
    await fetch(url, {
      method: 'PUT',
      body: blob,
      headers: { 'Content-Type': 'audio/webm' },
    });

    console.log(`Chunk ${num} uploaded`);
  } catch (err) {
    console.error(`Chunk ${num} upload failed:`, err);
    // Non-fatal — continue recording, chunk will be missing in final assembly
  }
}

async function stopRecording() {
  if (!recorder) return;

  // Stop recorder — fires one last ondataavailable
  recorder.stop();
  recorder.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  clearInterval(recTimerInt);

  // UI
  const btn = document.getElementById('recordBtn');
  btn.classList.remove('recording');
  document.getElementById('recordBtnText').textContent = 'Start recording';
  document.getElementById('recTimer').classList.remove('visible');

  // Wait a moment for the last chunk to upload
  await new Promise(r => setTimeout(r, 3000));

  // Tell Modal to start processing
  try {
    await fetch(`${CONFIG.MODAL_TRIGGER_URL}?session_id=${sessionId}&total_chunks=${chunkNum}`, {
      method: 'POST',
    });

    // Update DB status to "processing"
    await sb.from('sessions').update({ status: 'processing', total_chunks: chunkNum }).eq('id', sessionId);

    alert(`Recording saved! ${chunkNum} chunks uploaded.\nProcessing will take ~20-30 min. Check back soon.`);
    loadSessions();

    // Auto-poll this session for updates
    startPolling(sessionId);

  } catch (err) {
    alert('Failed to trigger processing: ' + err.message);
  }

  recorder  = null;
  sessionId = null;
  chunkNum  = 0;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// POLLING — refresh processing sessions every 30s
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startPolling(sid) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    const { data } = await sb.from('sessions').select('status').eq('id', sid).single();
    if (data?.status === 'completed' || data?.status === 'error') {
      clearInterval(pollInterval);
      loadSessions();
      if (currentSession?.id === sid) loadSessionDetail(sid);
    }
  }, 30000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SESSIONS LIST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadSessions() {
  const { data, error } = await sb
    .from('sessions')
    .select('id, name, status, duration_seconds, speakers, created_at')
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }

  const list = document.getElementById('sessionsList');
  if (!data?.length) {
    list.innerHTML = '<div style="padding:20px 16px;font-size:13px;color:#bbb">No sessions yet</div>';
    return;
  }

  // Start polling any processing sessions
  data.filter(s => s.status === 'processing').forEach(s => startPolling(s.id));

  list.innerHTML = data.map(s => {
    const date = new Date(s.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
    const dur  = s.duration_seconds ? fmtDuration(s.duration_seconds) : '';
    const spkCount = s.speakers?.length || '';
    const isActive = currentSession?.id === s.id;
    return `
      <div class="session-item ${isActive ? 'active' : ''}" onclick="loadSessionDetail('${s.id}')">
        <div class="session-name">${esc(s.name || 'Untitled session')}</div>
        <div class="session-info">
          <span class="status-dot ${s.status}"></span>
          ${date}${dur ? ' · ' + dur : ''}${spkCount ? ' · ' + spkCount + ' speakers' : ''}
        </div>
      </div>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SESSION DETAIL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadSessionDetail(sid) {
  const { data: s, error } = await sb.from('sessions').select('*').eq('id', sid).single();
  if (error) { console.error(error); return; }
  currentSession = s;

  // Update sidebar highlight
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.onclick?.toString().includes(sid));
  });

  // Header
  document.getElementById('sessionTitle').textContent = s.name || 'Untitled session';
  const dateStr = new Date(s.created_at).toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('sessionMeta').textContent = dateStr + (s.duration_seconds ? ' · ' + fmtDuration(s.duration_seconds) : '');

  // Badges
  const badges = [];
  if (s.language_mix) badges.push(`<span class="badge badge-purple">${esc(s.language_mix)}</span>`);
  if (s.mood) badges.push(`<span class="badge badge-amber">${esc(s.mood)}</span>`);
  const statusColors = { completed:'badge-green', processing:'badge-amber', error:'badge-gray', recording:'badge-gray' };
  badges.push(`<span class="badge ${statusColors[s.status]||'badge-gray'}">${s.status}</span>`);
  document.getElementById('headerBadges').innerHTML = badges.join('');

  if (s.status === 'completed') {
    // Stats
    document.getElementById('statsBar').style.display = 'grid';
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('statDuration').textContent  = s.duration_seconds ? fmtDuration(s.duration_seconds) : '—';
    document.getElementById('statSpeakers').textContent  = s.speakers?.length || '—';
    document.getElementById('statWords').textContent     = s.word_count?.toLocaleString() || '—';
    document.getElementById('statMoments').textContent   = s.key_moments?.length || '—';
    renderTab(s);
  } else {
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('tabBar').style.display = 'none';
    if (s.status === 'processing' || s.status === 'recording') {
      document.getElementById('mainContent').innerHTML = `
        <div class="processing-banner">
          <div class="spinner"></div>
          <div class="pb-text">
            <strong>Processing your recording...</strong>
            This takes 20–30 minutes. Grab a chai, come back later. This page checks automatically every 30 seconds.
          </div>
        </div>`;
    } else {
      document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Processing error</div><div class="empty-sub">Something went wrong. Check Modal logs for details.</div></div>`;
    }
  }
}

function renderTab(s) {
  const content = document.getElementById('mainContent');

  // Highlight active tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick')?.includes(`'${currentTab}'`)) t.classList.add('active');
  });

  if (currentTab === 'summary') {
    const speakers = (s.speakers||[]).map((sp,i) => `
      <div class="speaker-chip">
        <div class="avatar ${AVATAR_COLORS[i%5]}">${sp.label?.charAt(8)||i+1}</div>
        ${sp.label||sp.id} · ${sp.percentage}%
      </div>`).join('');

    content.innerHTML = `
      <div class="section">
        <div class="section-title">Speakers detected</div>
        <div class="speakers-row">${speakers || '<span style="color:#bbb;font-size:13px">No speaker data</span>'}</div>
      </div>
      <div class="section">
        <div class="section-title">AI summary</div>
        <div class="summary-box">${esc(s.summary||'No summary available').replace(/\n/g,'<br>')}</div>
      </div>
      ${s.action_items?.length ? `
      <div class="section">
        <div class="section-title">Action items</div>
        ${(s.action_items||[]).map(a=>`<div class="action-item">${esc(a)}</div>`).join('')}
      </div>` : ''}
      <div class="section">
        <div class="section-title">Keywords</div>
        <div class="keywords-wrap">${(s.keywords||[]).map(k=>`<span class="keyword">${esc(k)}</span>`).join('')}</div>
      </div>`;
  }

  else if (currentTab === 'transcript') {
    if (!s.transcript) { content.innerHTML = '<div style="color:#bbb;font-size:13px;padding:20px 0">No transcript available</div>'; return; }
    const lines = s.transcript.split('\n').map(line => {
      const match = line.match(/^\[([^\|]+)\s*\|\s*(\d+:\d+)\]\s*(.*)$/);
      if (match) {
        return `<div class="transcript-line"><span class="ts-label">${match[2]}</span><span class="spk-label">${esc(match[1].trim())}</span>${esc(match[3])}</div>`;
      }
      return `<div class="transcript-line">${esc(line)}</div>`;
    }).join('');
    content.innerHTML = `<div class="section"><div class="section-title">Full transcript</div>${lines}</div>`;
  }

  else if (currentTab === 'timeline') {
    const dotColors = ['#0f9b6e','#6b4fb0','#c08020','#c03020','#1a6090'];
    const moments = (s.key_moments||[]).map((m,i) => {
      const mins = Math.floor((m.time_seconds||0)/60);
      const secs = String((m.time_seconds||0)%60).padStart(2,'0');
      const color = dotColors[i%dotColors.length];
      return `<div class="tl-item">
        <div class="tl-dot" style="background:${color}"></div>
        <div class="tl-time">${mins}:${secs}</div>
        <div class="tl-speaker" style="color:${color}">${esc(m.speaker||'')}</div>
        <div class="tl-text">${esc(m.description||'')}</div>
      </div>`;
    }).join('');
    content.innerHTML = `<div class="section"><div class="section-title">Key moments</div><div class="timeline">${moments||'<span style="color:#bbb;font-size:13px">No key moments found</span>'}</div></div>`;
  }

  else if (currentTab === 'insights') {
    const spkDescs = s.speaker_descriptions || {};
    const descCards = Object.entries(spkDescs).map(([spk,desc],i) => `
      <div class="action-item" style="flex-direction:column;gap:4px">
        <span style="font-size:12px;font-weight:600;color:#0f9b6e">${esc(spk)}</span>
        <span>${esc(desc)}</span>
      </div>`).join('');

    content.innerHTML = `
      ${s.mood ? `<div class="section"><div class="section-title">Mood</div><div class="summary-box" style="font-size:14px">${esc(s.mood)}</div></div>` : ''}
      ${s.language_mix ? `<div class="section"><div class="section-title">Language breakdown</div><div class="summary-box" style="font-size:14px">${esc(s.language_mix)}</div></div>` : ''}
      ${descCards ? `<div class="section"><div class="section-title">Speaker profiles</div>${descCards}</div>` : ''}
      ${s.action_items?.length ? `<div class="section"><div class="section-title">What people said they'd do</div>${(s.action_items||[]).map(a=>`<div class="action-item">${esc(a)}</div>`).join('')}</div>` : ''}`;
  }
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (currentSession) renderTab(currentSession);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UTILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmtDuration(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
loadSessions();
</script>
